name: Release

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  windows-amd64-preview:
    name: Windows amd64 preview
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache-dependency-path: |
            tui/go.sum
            portal/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: portal/web/package-lock.json

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "preview-${{ github.sha }}" }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build and test TUI
        shell: pwsh
        working-directory: tui
        env:
          CGO_ENABLED: '0'
          GOOS: windows
          GOARCH: amd64
        run: |
          go test ./...
          go vet ./...
          go build -trimpath -ldflags "-X main.version=${{ steps.version.outputs.version }}" -o bin/lingtai-tui-windows-amd64.exe .
          .\bin\lingtai-tui-windows-amd64.exe version

      - name: Build and test Portal
        shell: pwsh
        working-directory: portal
        env:
          CGO_ENABLED: '0'
          GOOS: windows
          GOARCH: amd64
        run: |
          npm --prefix web ci
          npm --prefix web run build
          go test ./...
          go vet ./...
          go build -trimpath -ldflags "-X main.version=${{ steps.version.outputs.version }}" -o bin/lingtai-portal-windows-amd64.exe .
          .\bin\lingtai-portal-windows-amd64.exe version

      - name: Package exact preview archive
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $stage = 'dist/stage'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item tui/bin/lingtai-tui-windows-amd64.exe "$stage/lingtai-tui.exe"
          Copy-Item portal/bin/lingtai-portal-windows-amd64.exe "$stage/lingtai-portal.exe"
          @'
          # LingTai Windows amd64 experimental preview

          This archive contains only the Go TUI and Portal executables. It is not
          a supported native Windows runtime: Python/kernel provisioning, lifecycle
          interoperability, signing, PATH/services, and the built-in updater remain
          unsupported or unvalidated. macOS, Linux, and WSL remain supported.
          '@ | Set-Content -Path "$stage/WINDOWS-PREVIEW.md"
          $zip = "dist/lingtai-$version-windows-amd64-preview.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($zip)
          try { $members = @($archive.Entries.FullName) }
          finally { $archive.Dispose() }
          $expected = @('lingtai-tui.exe', 'lingtai-portal.exe', 'WINDOWS-PREVIEW.md')
          if ($members.Count -ne 3 -or (Compare-Object $members $expected)) { throw "unexpected archive members: $members" }
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $([IO.Path]::GetFileName($zip))" | Set-Content -Path "$zip.sha256"
          Copy-Item install-windows-preview.ps1 dist/install-windows-preview.ps1

      - name: Exercise bootstrap
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist -Filter 'lingtai-*-windows-amd64-preview.zip' | Select-Object -First 1
          $install = Join-Path $env:RUNNER_TEMP 'lingtai-preview'
          .\install-windows-preview.ps1 -ArchivePath $zip.FullName -ChecksumPath "$($zip.FullName).sha256" -InstallDir $install
          & "$install/lingtai-tui.exe" version
          & "$install/lingtai-portal.exe" version
          $bad = Join-Path $env:RUNNER_TEMP 'bad.sha256'
          "$('0' * 64)  $($zip.Name)" | Set-Content -Path $bad
          try {
            .\install-windows-preview.ps1 -ArchivePath $zip.FullName -ChecksumPath $bad -InstallDir $install
            throw 'bootstrap accepted a bad checksum'
          } catch {
            if ($_.Exception.Message -eq 'bootstrap accepted a bad checksum') { throw }
          }

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-preview
          path: |
            dist/lingtai-*-windows-amd64-preview.zip
            dist/lingtai-*-windows-amd64-preview.zip.sha256
            dist/install-windows-preview.ps1
          if-no-files-found: error

  source-release:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub source release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "GitHub release $TAG already exists; preserving it."
          else
            gh release create "$TAG" --repo "$REPO" --verify-tag \
              --title "$TAG" --notes "Release $TAG"
          fi

  publish-windows-amd64-preview:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [source-release, windows-amd64-preview]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-amd64-preview
          path: dist
      - name: Upload exact preview assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          [[ "$TAG" =~ ^v[0-9][A-Za-z0-9._-]*$ ]]
          zip="dist/lingtai-${TAG}-windows-amd64-preview.zip"
          sha="${zip}.sha256"
          bootstrap="dist/install-windows-preview.ps1"
          test -f "$zip" && test -f "$sha" && test -f "$bootstrap"
          (cd dist && sha256sum -c "$(basename "$sha")")
          test "$(unzip -Z1 "$zip" | wc -l | tr -d ' ')" = 3
          test "$(unzip -Z1 "$zip" | LC_ALL=C sort)" = "$(printf '%s\n' WINDOWS-PREVIEW.md lingtai-portal.exe lingtai-tui.exe | LC_ALL=C sort)"
          gh release upload "$TAG" "$zip" "$sha" "$bootstrap" --repo "$REPO" --clobber

  update-homebrew:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: source-release
    runs-on: ubuntu-latest
    steps:
      - name: Compute source tarball checksum
        id: sha
        env:
          TAG: ${{ github.ref_name }}
        run: |
          url="https://github.com/Lingtai-AI/lingtai/archive/refs/tags/${TAG}.tar.gz"
          sha=$(curl -sL "$url" | shasum -a 256 | cut -d' ' -f1)
          echo "source=$sha" >> "$GITHUB_OUTPUT"
          echo "Source tarball SHA256: $sha"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Lingtai-AI/homebrew-lingtai
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write formula
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ steps.sha.outputs.source }}
        run: |
          VERSION="${TAG#v}"
          cat > homebrew-tap/lingtai-tui.rb << FORMULA
          class LingtaiTui < Formula
            desc "Terminal UI for the Lingtai AI agent framework"
            homepage "https://github.com/Lingtai-AI/lingtai"
            version "${VERSION}"
            license "Apache-2.0"

            url "https://github.com/Lingtai-AI/lingtai/archive/refs/tags/${TAG}.tar.gz"
            sha256 "${SHA}"

            depends_on "go" => :build
            depends_on "node" => :build
            depends_on "uv" => :recommended
            depends_on "python@3.13" => :recommended

            def install
              # Network mirror selection. Go-module mirrors and the npm registry are
              # configured independently — a Go proxy outage must not force an npm
              # registry switch (and vice versa).
              #
              # Go modules:
              #   1. HOMEBREW_GOPROXY (explicit user override) — community convention,
              #      survives Homebrew's superenv scrub because of the HOMEBREW_ prefix.
              #   2. Auto-detect: probe a stable proxy.golang.org API endpoint with a
              #      3s timeout. If unreachable (typical on mainland China networks),
              #      fall back to CN-accessible mirrors for Go modules and the Go
              #      checksum database (sum.golang.google.cn is Google's own
              #      CN-reachable alias of sum.golang.org, required for CN builds).
              #   3. Otherwise: leave ENV untouched — users elsewhere see no difference.
              #
              # npm registry:
              #   1. HOMEBREW_NPM_CONFIG_REGISTRY (explicit user override) — same
              #      HOMEBREW_ prefix trick so it survives the superenv scrub.
              #   2. Auto-detect ONLY when the Go proxy was unreachable AND an npm
              #      client probe to registry.npmmirror.com succeeds. Use npm (not curl)
              #      so the probe exercises the same Node/npm TLS trust store that
              #      `npm ci` will use; otherwise leave the npm registry on its default.
              #   3. Otherwise: leave ENV untouched.
              if ENV["HOMEBREW_GOPROXY"]
                ENV["GOPROXY"] = ENV["HOMEBREW_GOPROXY"]
                go_proxy_reachable = true
              else
                go_proxy_reachable = quiet_system(
                  "curl", "-sSfL", "--max-time", "3", "-o", "/dev/null",
                  "https://proxy.golang.org/github.com/golang/go/@latest"
                )
                unless go_proxy_reachable
                  opoo "proxy.golang.org unreachable; using China-friendly Go build mirrors."
                  ENV["GOPROXY"] = "https://goproxy.cn,direct"
                  ENV["GOSUMDB"] = "sum.golang.google.cn"
                end
              end

              if ENV["HOMEBREW_NPM_CONFIG_REGISTRY"]
                ENV["NPM_CONFIG_REGISTRY"] = ENV["HOMEBREW_NPM_CONFIG_REGISTRY"]
              elsif !go_proxy_reachable
                npmmirror_reachable = quiet_system(
                  "npm", "ping", "--registry=https://registry.npmmirror.com",
                  "--fetch-timeout=3000", "--fetch-retries=0"
                )
                if npmmirror_reachable
                  opoo "Using China-friendly npm registry (registry.npmmirror.com)."
                  ENV["NPM_CONFIG_REGISTRY"] = "https://registry.npmmirror.com"
                else
                  opoo "registry.npmmirror.com failed npm's connectivity/TLS probe; leaving npm registry unchanged. Set HOMEBREW_NPM_CONFIG_REGISTRY to override."
                end
              end

              cd "tui" do
                ldflags = "-X main.version=#{version}"
                system "go", "build", *std_go_args(ldflags: ldflags), "-o", bin/"lingtai-tui", "."
              end

              cd "portal" do
                cd "web" do
                  system "npm", "ci"
                  system "npm", "run", "build"
                end
                ldflags = "-X main.version=#{version}"
                system "go", "build", *std_go_args(ldflags: ldflags), "-o", bin/"lingtai-portal", "."
              end
            end

            test do
              assert_match "lingtai-tui", shell_output("#{bin}/lingtai-tui version 2>&1", 0)
            end
          end
          FORMULA

      - name: Push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lingtai-tui.rb
          git diff --cached --quiet || git commit -m "Update lingtai-tui to ${{ github.ref_name }}"
          git push
