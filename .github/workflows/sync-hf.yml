name: Sync to HuggingFace

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter large binaries and push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Rewrite history to strip binaries rejected by HF
          pip install git-filter-repo
          git filter-repo \
            --path-glob 'tui/packages/*/bin/lingtai' \
            --path-glob '*.gif' \
            --path-glob '*.jpeg' \
            --path-glob '*.jpg' \
            --path-glob '*.png' \
            --path-glob '*.ico' \
            --path-glob '*.woff' \
            --path-glob '*.woff2' \
            --path-glob '*.ttf' \
            --invert-paths --force

          # Auth via GIT_ASKPASS (survives filter-repo config reset)
          echo '#!/bin/sh' > /tmp/git-askpass.sh
          echo "echo \$HF_TOKEN" >> /tmp/git-askpass.sh
          chmod +x /tmp/git-askpass.sh
          GIT_ASKPASS=/tmp/git-askpass.sh git push https://huangzs@huggingface.co/huangzs/lingtai main --force
